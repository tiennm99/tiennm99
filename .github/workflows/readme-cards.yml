name: Update README cards

on:
  schedule:
    - cron: "0 17 * * *" # 00:00 UTC+7 daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate grs stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&include_all_commits=true&show=prs_merged&theme=dracula
          path: profile/stats.svg
          token: ${{ secrets.SUMMARY_CARD_TOKEN }}

      - name: Generate grs top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=10&theme=dracula
          path: profile/top-langs.svg
          token: ${{ secrets.SUMMARY_CARD_TOKEN }}

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARD_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 7
          AUTO_PUSH: false

      - name: Commit cards
        if: ${{ !env.ACT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg profile-summary-card-output
          git diff --cached --quiet || git commit -m "Update README cards"
          git push
