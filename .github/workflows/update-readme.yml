name: Update README

on:
  schedule:
    - cron: "0 17 * * *" # 00:00 UTC+7 daily
  workflow_dispatch:
    inputs:
      tool:
        description: Tool to feature in README.md
        type: choice
        default: psc
        options: [grs, psc, metrics]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      README_TOOL: ${{ inputs.tool || 'psc' }}

    steps:
      - uses: actions/checkout@v6

      # github-readme-stats → output/grs/
      - name: grs — stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&include_all_commits=true&show=prs_merged&theme=dracula
          path: output/grs/stats.svg
          token: ${{ secrets.TOKEN }}

      - name: grs — top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=10&theme=dracula
          path: output/grs/top-langs.svg
          token: ${{ secrets.TOKEN }}

      # github-profile-summary-cards → output/psc/
      - name: psc — profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 7
          AUTO_PUSH: false

      - name: psc — relocate to output/psc
        run: |
          rm -rf output/psc
          mkdir -p output
          mv profile-summary-card-output output/psc

      - name: Commit grs + psc
        if: ${{ !env.ACT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/grs output/psc
          git diff --cached --quiet || git commit -m "Update grs + psc cards"
          git push

      # metrics — all official GitHub-data plugins (no external-service/community)
      - name: metrics
        if: ${{ !env.ACT }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.TOKEN }}
          user: ${{ github.repository_owner }}
          filename: output/metrics/metrics.svg
          config_timezone: Asia/Ho_Chi_Minh
          base: header, activity, community, repositories, metadata

          # Include private repos (token has `repo` scope)
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes
          repositories: 400

          # 🈷️ Languages — indepth = clones + analyzes for byte-accurate stats
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 12
          plugin_languages_sections: most-used

          # 📅 Isometric commit calendar (3D visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 📆 Flat commit calendar (all years)
          plugin_calendar: yes
          plugin_calendar_limit: 0

          # 🌇 GitHub Skyline (3D contribution graph, previous year)
          plugin_skyline: yes
          plugin_skyline_year: 2025

          # 💡 Coding habits — productive time, charts, facts
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_facts: yes

          # 🏆 Achievements (detailed badges)
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes

          # 🎟️ Follow-up on issues / PRs
          plugin_followup: yes

          # 👨‍💻 Lines of code changed
          plugin_lines: yes
          plugin_lines_history_limit: 1

          # ✨ Stargazers chart
          plugin_stargazers: yes

          # 📌 Starred topics
          plugin_topics: yes
          plugin_topics_mode: mastered
          plugin_topics_limit: 15

          # 💫 Star lists
          plugin_starlists: yes
          plugin_starlists_limit: 4

          # 🌟 Recently starred repos
          plugin_stars: yes
          plugin_stars_limit: 4

          # 📜 Licenses ratio
          plugin_licenses: yes
          plugin_licenses_ratio: yes

          # 🎩 Notable contributions
          plugin_notable: yes

          # 🏅 Repo contributors
          plugin_contributors: yes

          # 🧑‍🤝‍🧑 People (followers / following)
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 24

          # 🎭 Reactions on comments
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_days: 30

          # 💬 Discussions
          plugin_discussions: yes
          plugin_discussions_categories: yes

          # 🧮 Repository traffic
          plugin_traffic: yes

          # 🎫 Gists
          plugin_gists: yes

          # 📓 Featured repositories (pinned showcase)
          plugin_repositories: yes

          # ♐ Random code snippet
          plugin_code: yes
          plugin_code_lines: 12

          # 🙋 Introduction (bio)
          plugin_introduction: yes

      # Assemble README-<tool>.md for each tool, then README.md = copy of chosen
      - name: Assemble READMEs
        if: ${{ !env.ACT }}
        run: |
          git pull --rebase
          for tool in grs psc metrics; do
            sed "/<!-- STATS -->/r stats-${tool}.md" README-base.md \
              | sed "/<!-- STATS -->/d" > "README-${tool}.md"
          done
          cp "README-${README_TOOL}.md" README.md

      - name: Commit READMEs
        if: ${{ !env.ACT }}
        run: |
          git add README.md README-grs.md README-psc.md README-metrics.md
          git diff --cached --quiet || git commit -m "Update READMEs"
          git push
