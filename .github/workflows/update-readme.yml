name: Update README

on:
  schedule:
    - cron: "0 17 * * *" # 00:00 UTC+7 daily
  workflow_dispatch:
    inputs:
      tool:
        description: Tool to feature in README.md
        type: choice
        default: psc
        options: [grs, psc, metrics]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      README_TOOL: ${{ inputs.tool || 'psc' }}

    steps:
      - uses: actions/checkout@v6

      # github-readme-stats → output/grs/
      - name: grs — stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&include_all_commits=true&show=prs_merged&theme=dracula
          path: output/grs/stats.svg
          token: ${{ secrets.TOKEN }}

      - name: grs — top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=10&theme=dracula
          path: output/grs/top-langs.svg
          token: ${{ secrets.TOKEN }}

      # github-profile-summary-cards → output/psc/
      - name: psc — profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 7
          AUTO_PUSH: false

      - name: psc — relocate to output/psc
        run: |
          rm -rf output/psc
          mkdir -p output
          mv profile-summary-card-output output/psc

      - name: Commit grs + psc
        if: ${{ !env.ACT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/grs output/psc
          git diff --cached --quiet || git commit -m "Update grs + psc cards"
          git push

      # metrics — curated impressive-only plugin set (after review).
      # Dropped: calendar (dup of isocalendar), stars/starlists/gists (empty
      # or personal), traffic/support/sponsors (upstream/scope errors),
      # sponsorships/code/contributors/licenses/discussions (empty/noisy).
      # Disabled permanently: achievements, habits, skyline (upstream bugs).
      - name: metrics
        if: ${{ !env.ACT }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.TOKEN }}
          user: ${{ github.repository_owner }}
          filename: output/metrics/metrics.svg
          config_timezone: Asia/Ho_Chi_Minh
          base: header, activity, community, repositories, metadata

          # Include private repos (token has `repo` scope)
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes
          repositories: 400

          # 🙋 Introduction (bio)
          plugin_introduction: yes

          # 🈷️ Languages — indepth = clones + analyzes for byte-accurate stats.
          # recently-used section disabled (upstream null-committer crash).
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 32
          plugin_languages_sections: most-used

          # 📅 Isometric commit calendar (impressive 3D visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 🎟️ Follow-up on issues / PRs (integrated into Community stats)
          plugin_followup: yes

          # 👨‍💻 Lines of code changed (integrated into Repositories section).
          # Default history_limit (-1 = all) — limiting this also starves
          # the languages indepth analyzer.
          plugin_lines: yes

          # ✨ Stargazers chart
          plugin_stargazers: yes

          # 📌 Starred topics — mastered technologies
          plugin_topics: yes
          plugin_topics_mode: mastered
          plugin_topics_limit: 15

          # 🎩 Notable contributions
          plugin_notable: yes

          # 📓 Featured repositories (pinned showcase)
          plugin_repositories: yes

          # 🧑‍🤝‍🧑 People (followers / following)
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 24

          # 🎭 Reactions on comments
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_days: 30

      # Assemble README-<tool>.md for each tool, then README.md = copy of chosen
      - name: Assemble READMEs
        if: ${{ !env.ACT }}
        run: |
          git pull --rebase
          for tool in grs psc metrics; do
            sed "/<!-- STATS -->/r stats-${tool}.md" README-base.md \
              | sed "/<!-- STATS -->/d" > "README-${tool}.md"
          done
          cp "README-${README_TOOL}.md" README.md

      - name: Commit READMEs
        if: ${{ !env.ACT }}
        run: |
          git add README.md README-grs.md README-psc.md README-metrics.md
          git diff --cached --quiet || git commit -m "Update READMEs"
          git push
