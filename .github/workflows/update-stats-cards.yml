name: Update stats cards

on:
  schedule:
    - cron: "0 17 * * *" # 00:00 UTC+7 daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: tiennm99/ghstats@v1.0.0
        with:
          user: ${{ github.repository_owner }}
          # secrets.GHSTATS_TOKEN is a classic PAT with read:user + repo for
          # private stats. Falls back to the auto-issued github.token, which
          # can read public user data and push card commits but can't see
          # private repos.
          token: ${{ secrets.GHSTATS_TOKEN || github.token }}
          themes: dracula
          tz: Asia/Saigon
          include_forks: "true"
          include_private: "true"
          commit_changes: "true"
          commit_message: "chore: refresh stats cards"
